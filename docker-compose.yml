services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backstage"]
      interval: 5s
      timeout: 3s
      retries: 10

  backstage:
    image: quay.io/janus-idp/backstage-showcase:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7007:7007"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      APP_CONFIG_app_title: Platform Portal
      APP_CONFIG_organization_name: Shohrab Niaz
      APP_CONFIG_catalog_locations_0_type: file
      APP_CONFIG_catalog_locations_0_target: /catalog/catalog-info.yaml
      APP_CONFIG_catalog_locations_1_type: file
      APP_CONFIG_catalog_locations_1_target: /catalog/catalog/all-repos.yaml
    volumes:
      - ./catalog-info.yaml:/catalog/catalog-info.yaml:ro
      - ./catalog:/catalog/catalog:ro

volumes:
  pgdata:
