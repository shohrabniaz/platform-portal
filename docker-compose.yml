services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backstage"]
      interval: 5s
      timeout: 3s
      retries: 10

  backstage:
    image: quay.io/janus-idp/backstage-showcase:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7007:7007"
    environment:
      APP_CONFIG_app_baseUrl: http://localhost:7007
      APP_CONFIG_backend_baseUrl: http://localhost:7007
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
    volumes:
      - ./app-config.yaml:/opt/app-root/src/app-config.yaml:ro
      - ./catalog-info.yaml:/catalog/catalog-info.yaml:ro
      - ./catalog:/catalog/catalog:ro

volumes:
  pgdata:
