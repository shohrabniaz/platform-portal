name: Catalog Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pyyaml -q
          python -c "
          import pathlib, yaml
          for p in pathlib.Path('catalog').rglob('*.yaml'):
              list(yaml.safe_load_all(p.read_text()))
              print('OK', p)
          yaml.safe_load(pathlib.Path('app-config.yaml').read_text())
          print('OK app-config.yaml')
          "
      - run: test -f docker-compose.yml
